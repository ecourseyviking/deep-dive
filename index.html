<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Deep Dive &mdash; Collaborative Research Notes</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lora',Georgia,serif;background:#f5f0e8;min-height:100vh}
.hidden{display:none!important}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:#fffef9;border:1.5px solid #ddd5c4;border-radius:6px;box-shadow:6px 6px 0 rgba(13,43,69,.08);padding:36px 40px;width:100%;max-width:480px}
.login-logo{font-size:40px;text-align:center;margin-bottom:10px}
.login-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:#0d2b45;text-align:center}
.login-sub{font-family:'DM Mono',monospace;font-size:11px;color:#d4930a;text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:28px;margin-top:4px}
.login-section-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#8a7d68;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #ece5d8}
.login-section{margin-bottom:20px}
.login-select,.login-input{width:100%;font-family:'Lora',serif;font-size:13px;padding:8px 11px;background:#faf8f3;border:1px solid #ddd5c4;border-radius:3px;color:#1c1810;margin-bottom:8px}
.login-select:focus,.login-input:focus{outline:none;border-color:#0d2b45;box-shadow:0 0 0 2px rgba(13,43,69,.1)}
.login-name-row{display:grid;grid-template-columns:1fr 90px;gap:8px;margin-bottom:4px}
.login-name-row input{margin-bottom:0}
.login-hint{font-family:'DM Mono',monospace;font-size:9.5px;color:#aaa;margin-bottom:10px;padding-left:2px}
.login-btn{width:100%;padding:10px;font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;border:none;border-radius:3px;cursor:pointer;transition:background .2s}
.btn-student{background:#0d2b45;color:#f5f0e8;margin-bottom:4px}
.btn-student:hover{background:#1a4a70}
.btn-teacher{background:#8c1a1a;color:#f5f0e8}
.btn-teacher:hover{background:#b02020}
.login-divider{text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:#aaa;margin:16px 0;position:relative}
.login-divider::before,.login-divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#ddd5c4}
.login-divider::before{left:0}.login-divider::after{right:0}
.pwd-error{font-size:11px;color:#c0392b;margin-top:4px;font-family:'DM Mono',monospace;min-height:16px}

/* HEADER */
.app-header{background:#0d2b45;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.app-header.teacher-header{background:#6b1a1a}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{font-size:24px;line-height:1}
.header-title{font-family:'Playfair Display',serif;font-size:18px;color:#f5f0e8;font-weight:700}
.header-sub{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.55);letter-spacing:1px;margin-top:2px}
.header-right{display:flex;align-items:center;gap:8px}
.logout-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);font-family:'DM Mono',monospace;font-size:10px;padding:6px 14px;border-radius:3px;cursor:pointer;letter-spacing:1px;transition:all .15s}
.logout-btn:hover{background:rgba(255,255,255,.2)}
.export-header-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);font-family:'DM Mono',monospace;font-size:10px;padding:6px 12px;border-radius:3px;cursor:pointer;letter-spacing:1px;transition:all .15s}
.export-header-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5)}

/* PAGE */
.page-wrap{min-height:100vh;display:flex;flex-direction:column}
.student-body{flex:1;padding:20px 20px 60px;max-width:900px;margin:0 auto;width:100%}

/* STUDENT FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fffef9;border:1px solid #ddd5c4;border-radius:4px;padding:10px 14px;margin-bottom:20px}
.filter-label{font-family:'DM Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:2px;color:#8a7d68;white-space:nowrap}
.filter-select{font-family:'DM Mono',monospace;font-size:10px;padding:4px 8px;background:#faf8f3;border:1px solid #ddd5c4;border-radius:3px;color:#1c1810;cursor:pointer}
.filter-select:focus{outline:none;border-color:#0d2b45}
.filter-clear{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;background:#fef4e0;border:1px solid #f0d49a;color:#a06b00;padding:4px 10px;border-radius:3px;cursor:pointer}
.filter-clear:hover{background:#f0d49a}

/* CARDS */
.card{background:#fffef9;border:1.5px solid #ddd5c4;border-radius:4px;box-shadow:4px 4px 0 rgba(13,43,69,.07);overflow:hidden;margin-bottom:16px;animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-topbar{display:flex;align-items:center;background:#0d2b45;padding:9px 16px;gap:10px}
.card-num{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55);white-space:nowrap}
.card-title-display{font-family:'Playfair Display',serif;font-size:13px;color:#f5c842;flex:1;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.collapse-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:4px 10px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;border-radius:3px;transition:all .15s}
.collapse-btn:hover{background:rgba(255,255,255,.2)}
.delete-card-btn{background:none;border:1px solid rgba(255,80,80,.3);color:rgba(255,120,120,.7);padding:4px 8px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border-radius:3px;flex-shrink:0;transition:all .15s}
.delete-card-btn:hover{background:rgba(255,80,80,.15);color:#ff9090;border-color:#ff9090}

/* SECTION */
.section-header{display:flex;align-items:center;gap:10px;padding:9px 16px 8px;border-bottom:1px solid #ece5d8}
.section-label{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:2px;padding:3px 8px;border-radius:2px;white-space:nowrap}
.lbl-front{background:#e8f4f0;color:#1a6b5a;border:1px solid #b5ddd5}
.lbl-inside{background:#fef4e0;color:#a06b00;border:1px solid #f0d49a}
.lbl-back{background:#eef1fa;color:#2a3e8c;border:1px solid #c0caee}
.lbl-draft{background:#f5edf8;color:#6b2a8c;border:1px solid #d9b5e8}
.section-desc{font-size:10.5px;color:#8a7d68;font-style:italic}
.section-body{padding:14px 16px 16px}
.section-divider{height:1px;background:linear-gradient(to right,#ddd5c4 60%,transparent)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.grid-2 .full{grid-column:1/-1}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}}

/* FORM */
.field-group{display:flex;flex-direction:column;gap:4px}
.field-label{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.8px;color:#8a7d68}
input[type=text],input[type=password],textarea,select{font-family:'Lora',serif;font-size:12.5px;color:#1c1810;background:#faf8f3;border:1px solid #ddd5c4;border-radius:3px;padding:6px 9px;width:100%;transition:border-color .15s,box-shadow .15s}
input[type=text]:focus,input[type=password]:focus,textarea:focus,select:focus{outline:none;border-color:#0d2b45;box-shadow:0 0 0 2px rgba(13,43,69,.1);background:#fff}
textarea{resize:vertical;min-height:60px;line-height:1.5}
.rel-note-input{flex:1!important;width:auto!important}

/* TYPE CHIPS */
.type-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.type-chip{padding:5px 14px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;border:1.5px solid #ddd5c4;background:#faf8f3;color:#8a7d68;border-radius:20px;cursor:pointer;transition:all .15s;user-select:none}
.type-chip:hover{border-color:#0d2b45;color:#0d2b45}
.type-chip.active-study{background:#e8f4f0;border-color:#1a6b5a;color:#1a6b5a;font-weight:500}
.type-chip.active-news{background:#fef4e0;border-color:#a06b00;color:#a06b00;font-weight:500}

/* STARS */
.reliability-row{display:flex;align-items:center;gap:8px;margin-top:2px}
.stars{display:flex;gap:2px;flex-shrink:0}
.star{font-size:20px;cursor:pointer;color:#ddd5c4;transition:transform .1s;line-height:1;user-select:none}
.star.filled{color:#d4930a}
.star:hover{transform:scale(1.15)}

/* EQ */
.eq-list{display:flex;flex-direction:column;gap:6px}
.eq-item{border:1px solid #ece5d8;border-radius:3px;overflow:hidden;transition:border-color .12s}
.eq-item.checked{border-color:#c0caee}
.eq-checkbox-wrap{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;cursor:pointer;user-select:none;transition:background .12s}
.eq-checkbox-wrap:hover{background:#f5f0e8}
.eq-item.checked .eq-checkbox-wrap{background:#eef1fa}
.eq-box{width:15px;height:15px;border:1.5px solid #8a7d68;border-radius:2px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all .12s}
.eq-box.checked{background:#2a3e8c;border-color:#2a3e8c}
.eq-text{font-size:11.5px;line-height:1.4;color:#1c1810;flex:1}
.eq-comment-wrap{padding:0 10px 10px 34px}
.eq-comment-ta{min-height:52px;font-size:12px;background:#f5f8ff}
.eq-new-badge{font-family:'DM Mono',monospace;font-size:8px;background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:1px 5px;border-radius:8px;margin-left:5px}

/* QUOTES */
.quote-box-wrap{margin-bottom:10px}
.quote-box{background:#fffbed;border-left:3px solid #d4930a;padding:8px 11px;border-radius:0 3px 3px 0}
.quote-ta{background:transparent!important;border:none!important;font-style:italic;font-size:12px;min-height:50px;padding:0!important;box-shadow:none!important}
.quote-ta:focus{outline:none!important;box-shadow:none!important}
.para-label{font-family:'DM Mono',monospace;font-size:10px;color:#a06b00;margin-top:5px;display:flex;align-items:center;gap:4px}
.para-input{width:60px!important;font-family:'DM Mono',monospace!important;font-size:10px!important;color:#a06b00!important;background:transparent!important;border:none!important;border-bottom:1px dashed #d4930a!important;border-radius:0!important;padding:1px 3px!important;box-shadow:none!important}
.para-input:focus{outline:none!important;box-shadow:none!important}
.remove-quote-btn{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;background:none;border:1px solid #e0a0a0;color:#c06060;padding:2px 6px;border-radius:2px;cursor:pointer;margin-left:8px}
.remove-quote-btn:hover{background:#fde8e8}
.add-quote-btn{background:none;border:1px dashed #c0caee;color:#2a3e8c;padding:6px 14px;border-radius:3px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:4px;transition:all .15s}
.add-quote-btn:hover{background:#eef1fa;border-style:solid}

/* TAGS */
.tags-wrap{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-top:4px;min-height:32px;padding:4px;background:#faf8f3;border:1px solid #ddd5c4;border-radius:3px}
.tag-pill{background:#f5edf8;border:1px solid #d9b5e8;color:#6b2a8c;font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tag-remove{cursor:pointer;font-size:13px;line-height:1;color:#a060c0}
.tag-remove:hover{color:#c0208c}
.tag-input-field{font-family:'DM Mono',monospace!important;font-size:10px!important;background:none!important;border:none!important;color:#6b2a8c!important;padding:2px 4px!important;width:90px!important;border-radius:0!important;min-height:0!important;box-shadow:none!important}
.tag-input-field:focus{outline:none!important;box-shadow:none!important}

/* SAVE / ADD */
.save-card-btn{background:#1a6b5a;border:none;color:#fff;padding:10px 24px;border-radius:3px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;cursor:pointer;transition:background .15s}
.save-card-btn:hover{background:#155548}
.saved-ts{font-family:'DM Mono',monospace;font-size:9px;color:#8a7d68}
.add-source-btn{background:#0d2b45;color:#f5f0e8;border:none;padding:11px 28px;font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;border-radius:3px;transition:background .2s}
.add-source-btn:hover{background:#d4930a}

/* COLLAPSED */
.collapsed-bar{display:flex;align-items:center;gap:10px;padding:10px 14px}
.collapsed-num{font-family:'DM Mono',monospace;font-size:10px;color:#8a7d68;letter-spacing:1px;flex-shrink:0}
.collapsed-main{flex:1;min-width:0}
.collapsed-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.source-link{font-family:'Playfair Display',serif;font-size:13px;color:#0d2b45;font-weight:700;text-decoration:none;font-style:italic}
.source-link:hover{color:#d4930a;text-decoration:underline}
.collapsed-title{font-family:'Playfair Display',serif;font-size:13px;color:#0d2b45;font-weight:700;font-style:italic}
.collapsed-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.by-label{font-family:'DM Mono',monospace;font-size:9px;color:#8a7d68;margin-right:4px}
.expand-btn{background:#0d2b45;border:none;color:#f5f0e8;padding:6px 12px;border-radius:3px;font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;flex-shrink:0;transition:background .15s}
.expand-btn:hover{background:#d4930a}

/* BADGES */
.badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:3px;font-weight:500}
.badge-study{background:#e8f4f0;color:#1a6b5a;border:1px solid #b5ddd5}
.badge-news{background:#fef4e0;color:#a06b00;border:1px solid #f0d49a}
.mini-badge{font-family:'DM Mono',monospace;font-size:8.5px;padding:2px 6px;border-radius:10px}
.tag-mini{background:#f5edf8;color:#6b2a8c;border:1px solid #d9b5e8}
.section-mini{background:#f0f0f0;color:#444;border:1px solid #ccc}
.eqc-0{background:#e8f4f0;color:#1a6b5a;border:1px solid #b5ddd5}
.eqc-1{background:#fef4e0;color:#a06b00;border:1px solid #f0d49a}
.eqc-2{background:#eef1fa;color:#2a3e8c;border:1px solid #c0caee}
.eqc-3{background:#f5edf8;color:#6b2a8c;border:1px solid #d9b5e8}
.eqc-4{background:#fde8e8;color:#8c1a1a;border:1px solid #f0b5b5}
.eqc-5{background:#e8f0fd;color:#1a3a8c;border:1px solid #b5c8f0}
.eqc-6{background:#f0fde8;color:#2a6b1a;border:1px solid #b5ddb5}
.eqc-7{background:#fdf5e8;color:#6b4a1a;border:1px solid #d4b87a}

/* STUDENT FEEDBACK */
.student-feedback-view{background:#f0f4ff;border-top:2px solid #2a3e8c;padding:12px 16px}
.feedback-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#2a3e8c;margin-bottom:8px}
.fb-check-item{font-size:11.5px;color:#1a5a30;margin-bottom:3px}
.fb-comment-text{font-size:12px;color:#1c1810;margin-top:8px;line-height:1.5;padding:8px;background:#fff;border-radius:3px;border:1px solid #c0caee}

/* TEACHER LAYOUT */
.teacher-body{flex:1;display:grid;grid-template-columns:270px 1fr;gap:0;min-height:0}
@media(max-width:800px){.teacher-body{grid-template-columns:1fr}}
.teacher-group-panel{background:#2a2a2a;padding:16px;overflow-y:auto;max-height:calc(100vh - 58px);position:sticky;top:58px}
.panel-label{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:2.5px;color:rgba(255,255,255,.4);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1)}
.period-section{margin-bottom:14px}
.period-heading{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.group-tiles-row{display:flex;flex-wrap:wrap;gap:4px}
.group-tile{padding:5px 9px;border-radius:3px;cursor:pointer;border:1.5px solid rgba(255,255,255,.15);transition:all .15s;background:rgba(255,255,255,.06)}
.group-tile:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.35)}
.group-tile.active{border-color:#f5c842;background:rgba(245,200,66,.15)}
.tile-name{font-family:'DM Mono',monospace;font-size:9.5px;color:rgba(255,255,255,.75)}
.group-tile.active .tile-name{color:#f5c842}

/* EQ MANAGER */
.eq-manager{margin-top:16px;border-top:1px solid rgba(255,255,255,.1);padding-top:14px}
.eq-manager-label{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:8px}
.eq-manager-list{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.eq-mgr-item{font-size:10.5px;color:rgba(255,255,255,.65);padding:5px 8px;background:rgba(255,255,255,.05);border-radius:3px;border:1px solid rgba(255,255,255,.08);line-height:1.35}
.eq-mgr-num{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.3);margin-right:5px}
.eq-mgr-item.is-new{border-color:rgba(255,193,7,.4);background:rgba(255,193,7,.06)}
.add-eq-row{display:flex;flex-direction:column;gap:5px}
.add-eq-input{font-family:'Lora',serif;font-size:11px;padding:6px 8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:3px;color:#fff;width:100%;resize:none}
.add-eq-input::placeholder{color:rgba(255,255,255,.3)}
.add-eq-input:focus{outline:none;border-color:rgba(245,200,66,.6)}
.add-eq-btn{background:#d4930a;border:none;color:#fff;padding:7px 10px;border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:background .15s}
.add-eq-btn:hover{background:#b07a00}
.eq-push-note{font-family:'DM Mono',monospace;font-size:8.5px;color:rgba(255,255,255,.28);line-height:1.5}

/* TEACHER CARDS PANEL */
.teacher-cards-panel{padding:20px;overflow-y:auto;background:#f5f0e8}
.select-prompt{text-align:center;padding:60px 20px;color:#8a7d68;font-style:italic;font-size:14px}
.loading-msg{text-align:center;padding:40px;font-family:'DM Mono',monospace;font-size:11px;color:#8a7d68}

/* TEACHER PANEL HEADER */
.teacher-panel-header{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;padding-bottom:12px;border-bottom:2px solid #0d2b45}
.teacher-group-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#0d2b45;flex:1;min-width:0}
.count-badge{font-family:'DM Mono',monospace;font-size:11px;padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.count-badge.total{background:#0d2b45;color:#f5f0e8}
.count-badge.filtered{background:#d4930a;color:#fff}

/* TEACHER FILTER BAR */
.teacher-filter-bar{background:#fffef9;border:1px solid #ddd5c4;border-radius:4px;padding:10px 12px;margin-bottom:12px}
.tfilter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.tfilter-row:last-child{margin-bottom:0}
.tfilter-sep{height:1px;background:#ece5d8;margin:6px 0}

/* STUDENT BREAKDOWN */
.student-breakdown{background:#f0f4ff;border:1px solid #c0caee;border-radius:4px;padding:10px 12px;margin-bottom:16px}
.sb-title{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#2a3e8c;margin-bottom:8px}
.sb-grid{display:flex;flex-wrap:wrap;gap:6px}
.sb-chip{font-family:'DM Mono',monospace;font-size:10px;padding:3px 10px;border-radius:20px;border:1.5px solid #c0caee;background:#eef1fa;color:#2a3e8c;cursor:pointer;transition:all .12s;white-space:nowrap}

// ── STORAGE ──
// ── APPS SCRIPT REST BRIDGE (GitHub Pages + Google Sign-In) ──
// Every call sends the Google ID token so the server can verify
// the user is on the school domain before doing anything.
async function api_(fn,...args){
  if(!S.idToken)throw Object.assign(new Error('Not signed in')  ,{isAuth:true});
  let resp;
  try{
    resp=await Promise.race([
      fetch(SCRIPT_URL,{
        method:'POST',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({token:S.idToken,fn,args})
      }),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('Request timed out — check your connection.')),30000))
    ]);
  }catch(e){throw e;}
  if(!resp.ok)throw new Error('Server error ('+resp.status+')');
  const data=await resp.json();
  if(data.error){
    const e=new Error(data.error);
    if(/domain|auth|token|sign/i.test(data.error))e.isAuth=true;
    throw e;
  }
  return data.result;
}

async function loadCards(g){try{const r=await api_('storageGet','dd-cards-'+g);return r?JSON.parse(r):[];}catch(e){if(e.isAuth)throw e;return[];}}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function padCard(card){const n=S.eqList.length;while(card.eqs.length<n)card.eqs.push(false);while(card.eqComments.length<n)card.eqComments.push('');if(!card.s2gen)card.s2gen=Array(5).fill('');while(card.s2gen.length<5)card.s2gen.push('');if(!card.s2focus)card.s2focus=Array(3).fill('');while(card.s2focus.length<3)card.s2focus.push('');if(!card.s2genChecked)card.s2genChecked=Array(5).fill(false);while(card.s2genChecked.length<5)card.s2genChecked.push(false);if(!card.s2focusChecked)card.s2focusChecked=Array(3).fill(false);while(card.s2focusChecked.length<3)card.s2focusChecked.push(false);}
function newCard(){const n=S.eqList.length;return{id:uid(),createdBy:S.studentName,savedAt:null,collapsed:false,sourceType:'',sourceTitle:'',author:'',url:'',reliabilityNote:'',reliability:0,mlaCitation:'',hypothesis:'',method:'',keyData:'',studyConclusion:'',mainArg:'',evidence:'',advice:'',eqs:Array(n).fill(false),eqComments:Array(n).fill(''),quotes:[{text:'',ref:''}],otherNotes:'',section:'',tags:[],s2gen:Array(5).fill(''),s2focus:Array(3).fill(''),s2genChecked:Array(5).fill(false),s2focusChecked:Array(3).fill(false)};}

function syncCard(id){
  const c=S.cards.find(x=>x.id===id);if(!c)return;
  c.createdBy=v(id+'-by');c.sourceTitle=v(id+'-title');c.author=v(id+'-author');c.url=v(id+'-url');c.mlaCitation=v(id+'-mla');c.reliabilityNote=v(id+'-relNote');

function onGoogleSignIn(response){
  // response.credential is a signed ID token (JWT)
  // Parse the payload to get user info (no verification needed client-side —
  // the server verifies the signature and domain before doing anything)
  const payload=JSON.parse(atob(response.credential.split('.')[1]));
  const email=payload.email||'';
  const name=payload.name||payload.given_name||email.split('@')[0];
  const hd=payload.hd||'';  // hosted domain — only present for Workspace accounts

  // Store token and basic info in state
  S.idToken=response.credential;
  S.userEmail=email;

  // Show group picker step
  showGroupPicker(name,email);
}

async function loginStudent(){
  const gid=document.getElementById('grp').value;
  const first=(document.getElementById('sfirst').value||'').trim();
  const last=(document.getElementById('slast').value||'').trim().replace(/\./g,'').slice(0,1).toUpperCase();
  if(!gid){alert('Please select your group.');return;}
  if(!first){alert('Please enter your first name.');return;}
  if(!last){alert('Please enter your last initial.');return;}
  if(!S.idToken){alert('Please sign in with your Google account first.');showLogin();return;}
  S.studentName=first+' '+last+'.';
  S.groupId=gid;S.view='student';
  document.getElementById('app').innerHTML=`<div style="text-align:center;padding:80px;color:#8a7d68;font-family:'Lora',serif;">
    <div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;color:#0d2b45;margin-bottom:6px">Loading your notes&hellip;</div>
    <div id="load-status" style="font-size:11px;color:#aaa;margin-top:6px"></div>
  </div>`;
  function setLS(m){const el=document.getElementById('load-status');if(el)el.textContent=m;}
  try{

    S.eqList=await loadEQs();S.origEQCount=S.eqList.length;

    S.cards=await loadCards(gid);S.cards.forEach(padCard);
    setLS('Loading feedback…');
    S.feedback=await loadFB(gid);
    S.focusArea=await loadFocus(gid);

  }
}

async function loginTeacher(){

  S.view='teacher';S.teacherGroupId=null;

}

function renderStudentFB(){
  const el=document.getElementById('filter-bar');if(!el)return;
  const saved=S.cards.filter(c=>c.savedAt);
  const allTags=[...new Set(saved.flatMap(c=>c.tags||[]))].sort();
  const allSecs=[...new Set(saved.filter(c=>c.section).map(c=>c.section))].sort();
  const f=S.filter;const active=f.eq||f.tag||f.section;
  el.innerHTML=`<span class="filter-label">Filter:</span>
    <select class="filter-select" onchange="setFilter('eq',this.value)">
      <option value="">All EQs</option>
      ${S.eqList.map((l,i)=>`<option value="${eqTag(i)}" ${f.eq===eqTag(i)?'selected':''}>${eqTag(i)}: ${esc(l.substring(0,28))}${l.length>28?'...':''}</option>`).join('')}
    </select>
    <select class="filter-select" onchange="setFilter('tag',this.value)">
      <option value="">All Tags</option>
      ${allTags.map(t=>`<option value="${esc(t)}" ${f.tag===t?'selected':''}>&#x23;${esc(t)}</option>`).join('')}
    </select>
    <select class="filter-select" onchange="setFilter('section',this.value)">
      <option value="">All Sections</option>
      ${allSecs.map(s=>`<option value="${esc(s)}" ${f.section===s?'selected':''}>${esc(s)}</option>`).join('')}
    </select>
    ${active?'<button class="filter-clear" onclick="clearFilters()">&#x2715; Clear</button>':''}`;
}

function setFilter(k,val){S.filter[k]=val;renderStudentFB();renderCards();}
function clearFilters(){S.filter={tag:'',eq:'',section:''};renderStudentFB();renderCards();}

function renderCards(){
  const area=document.getElementById('cards-area');if(!area)return;
  const saved=S.cards.filter(c=>c.savedAt);
  const unsaved=S.cards.filter(c=>!c.savedAt);
  let filtered=[...saved];
  if(S.filter.eq){const idx=S.eqList.findIndex((_,i)=>eqTag(i)===S.filter.eq);if(idx>=0)filtered=filtered.filter(c=>c.eqs[idx]);}
  if(S.filter.tag)filtered=filtered.filter(c=>c.tags&&c.tags.includes(S.filter.tag));
  if(S.filter.section)filtered=filtered.filter(c=>c.section===S.filter.section);
  let html='';
  if(!filtered.length&&saved.length)html='<div class="no-results">No saved sources match your current filters.</div>';
  filtered.forEach((card,i)=>{html+=card.collapsed?buildCollapsed(card,i+1):buildExpanded(card,i+1);});
  unsaved.forEach((card,i)=>{html+=buildExpanded(card,filtered.length+i+1);});
  area.innerHTML=html;
}

async function selectGroup(gid){
  S.teacherGroupId=gid;S.openFeedbackCardId=null;S.teacherFilter={tag:'',eq:'',student:''};
  document.querySelectorAll('.group-tile').forEach(t=>t.classList.remove('active'));
  const tile=document.getElementById('tile-'+gid);if(tile)tile.classList.add('active');
  document.getElementById('teacher-cards-panel').innerHTML='<div class="loading-msg">Loading '+gid+'...</div>';
  S.teacherCards=await loadCards(gid);S.teacherCards.forEach(padCard);
  S.teacherFeedback=await loadFB(gid);
  S.teacherGroupFocus=await loadFocus(gid);
  renderTCards();
}

function renderTCards(){
  const panel=document.getElementById('teacher-cards-panel');if(!panel)return;
  const saved=S.teacherCards.filter(c=>c.savedAt);
  const total=saved.length;

  // derive dropdown options
  const allTags=[...new Set(saved.flatMap(c=>c.tags||[]))].sort();
  const allStudents=[...new Set(saved.map(c=>c.createdBy||'Unknown'))].sort();
  const tf=S.teacherFilter;

  // apply filters
  let filtered=[...saved];
  if(tf.eq){const idx=S.eqList.findIndex((_,i)=>eqTag(i)===tf.eq);if(idx>=0)filtered=filtered.filter(c=>c.eqs[idx]);}
  if(tf.tag)filtered=filtered.filter(c=>c.tags&&c.tags.includes(tf.tag));
  if(tf.student)filtered=filtered.filter(c=>(c.createdBy||'Unknown')===tf.student);
  const shown=filtered.length;
  const isFiltered=!!(tf.tag||tf.eq||tf.student);

  if(!total){panel.innerHTML=`<div class="select-prompt">Group <strong>${esc(S.teacherGroupId)}</strong> has no saved cards yet.</div>`;return;}

  // per-student totals and filtered counts
  const studentTotal={};const studentFiltered={};
  saved.forEach(c=>{const s=c.createdBy||'Unknown';studentTotal[s]=(studentTotal[s]||0)+1;});
  filtered.forEach(c=>{const s=c.createdBy||'Unknown';studentFiltered[s]=(studentFiltered[s]||0)+1;});

  const fa=S.teacherGroupFocus;
  const faStyle=fa&&FA_STYLE[fa]?FA_STYLE[fa]:null;
  const faBadge=faStyle
    ?`<span style="font-family:'DM Mono',monospace;font-size:10px;padding:4px 12px;border-radius:20px;background:${faStyle.bg};border:1px solid ${faStyle.border};color:${faStyle.text};white-space:nowrap">${faStyle.icon} ${esc(FOCUS_AREAS[fa].label)}</span>`
    :`<span style="font-family:'DM Mono',monospace;font-size:10px;padding:4px 12px;border-radius:20px;background:#f5f0e8;border:1px solid #ddd5c4;color:#8a7d68;white-space:nowrap">No focus area set</span>`;
  const countBadge=isFiltered
    ?`<span class="count-badge filtered">${shown} of ${total} card${total!==1?'s':''}</span>`
    :`<span class="count-badge total">${total} card${total!==1?'s':''}</span>`;

  // student breakdown chips
  const sbChips=allStudents.map(s=>{
    const tot=studentTotal[s]||0;
    const filt=studentFiltered[s]||0;
    const isActive=tf.student===s;
    let countHtml=`<span class="sb-count">(${tot})</span>`;
    if(isFiltered&&!tf.student)countHtml=`<span class="sb-count">${filt}/${tot}</span>`;
    return`<span class="sb-chip${isActive?' active':''}" onclick="toggleStudentFilter('${esc(s).replace(/'/g,"\\'")}')">
      ${esc(s)}${countHtml}
    </span>`;
  }).join('');

  let html=`
    <div class="teacher-panel-header">
      <div class="teacher-group-title">&#x1F4DA; ${esc(S.teacherGroupId)}</div>
      ${faBadge}
      ${countBadge}
      <button class="export-inline-btn" onclick="openTeacherExportModal('group')">&#x2B07; Export</button>
    </div>
    <div style="background:#fffef9;border:1px solid #ddd5c4;border-radius:4px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#8a7d68">Set Focus Area:</span>
      <select style="font-family:'DM Mono',monospace;font-size:10px;padding:4px 8px;background:#faf8f3;border:1px solid #ddd5c4;border-radius:3px;color:#1c1810;cursor:pointer" onchange="setTeacherGroupFocus(this.value)">
        <option value="">-- not set --</option>
        <option value="cognitive" ${S.teacherGroupFocus==='cognitive'?'selected':''}>Cognitive Dependency</option>
        <option value="compulsivity" ${S.teacherGroupFocus==='compulsivity'?'selected':''}>Digital Compulsivity</option>
        <option value="attention" ${S.teacherGroupFocus==='attention'?'selected':''}>Attention Dysregulation</option>
      </select>
      <span style="font-family:'DM Mono',monospace;font-size:9px;color:#8a7d68">Students see this update when they next load the app.</span>
    </div>
    <div class="student-breakdown">
      <div class="sb-title">&#x1F464; Students &mdash; click to filter</div>
      <div class="sb-grid">${sbChips}</div>
    </div>
    <div class="teacher-filter-bar">
      <div class="tfilter-row">
        <span class="filter-label">EQ:</span>
        <select class="filter-select" onchange="setTFilter('eq',this.value)">
          <option value="">All EQs</option>
          ${S.eqList.map((l,i)=>`<option value="${eqTag(i)}" ${tf.eq===eqTag(i)?'selected':''}>${eqTag(i)}: ${esc(l.substring(0,28))}${l.length>28?'...':''}</option>`).join('')}
        </select>
        <span class="filter-label" style="margin-left:8px">Tag:</span>
        <select class="filter-select" onchange="setTFilter('tag',this.value)">
          <option value="">All Tags</option>
          ${allTags.map(t=>`<option value="${esc(t)}" ${tf.tag===t?'selected':''}>&#x23;${esc(t)}</option>`).join('')}
        </select>
        ${isFiltered?`<button class="filter-clear" onclick="clearTFilters()">&#x2715; Clear All</button>`:''}
      </div>
    </div>`;

  if(!filtered.length){html+='<div class="no-results">No cards match the current filters.</div>';}
  else{filtered.forEach((card,i)=>{html+=buildTCard(card,i+1,S.openFeedbackCardId===card.id);});}
  panel.innerHTML=html;
}

function setTFilter(k,val){S.teacherFilter[k]=val;renderTCards();}
function clearTFilters(){S.teacherFilter={tag:'',eq:'',student:''};renderTCards();}
function toggleStudentFilter(student){
  S.teacherFilter.student=S.teacherFilter.student===student?'':student;
  renderTCards();
}

function buildCollapsed(card,num){
  const eqOn=card.eqs.map((v,i)=>v?i:-1).filter(i=>i>=0);
  const fb=S.feedback[card.id];const hasFb=fb&&(fb.comment||Object.values(fb.checklist||{}).some(Boolean));
  const titleEl=card.url?`<a href="${esc(card.url)}" target="_blank" class="source-link">${esc(card.sourceTitle||'Untitled')} &#x2197;</a>`:`<span class="collapsed-title">${esc(card.sourceTitle||'Untitled')}</span>`;
  return`<div class="card" data-id="${card.id}">
    <div class="collapsed-bar">
      <div class="collapsed-num">#${num}</div>
      <div class="collapsed-main">
        <div class="collapsed-title-row">${titleEl}${card.sourceType?`<span class="badge badge-${card.sourceType}">${card.sourceType==='study'?'&#x1F52C; Study':'&#x1F4F0; News/Health'}</span>`:''}${hasFb?'<span style="font-size:13px" title="Teacher feedback">&#x1F4AC;</span>':''}</div>
        <div class="collapsed-meta"><span class="by-label">By: ${esc(card.createdBy||'?')}</span>${eqOn.map(i=>`<span class="mini-badge ${eqCls(i)}">${eqTag(i)}</span>`).join('')}${(card.tags||[]).map(t=>`<span class="mini-badge tag-mini">&#x23;${esc(t)}</span>`).join('')}${card.section?`<span class="mini-badge section-mini">&#x1F4DD; ${esc(card.section)}</span>`:''}</div>
      </div>
      <button class="expand-btn" onclick="expandCard('${card.id}')">Expand &#x25BC;</button>
    </div>
    ${hasFb&&fb.comment?`<div style="padding:6px 14px 10px;background:#eef1fa;border-top:1px solid #c0caee"><span style="font-family:'DM Mono',monospace;font-size:9px;color:#2a3e8c;text-transform:uppercase;letter-spacing:1.5px">&#x1F4AC; Teacher: </span><em style="font-size:11.5px;color:#1c1810">${esc(fb.comment.substring(0,120))}${fb.comment.length>120?'...':''}</em></div>`:''}
  </div>`;
}

// ── EXPORT ──
function csvQ(val){
  const s=String(val===null||val===undefined?'':val);
  if(s.includes(',')||s.includes('"')||s.includes('\n')||s.includes('\r'))return'"'+s.replace(/"/g,'""')+'"';
  return s;
}

function buildCSVHeaders(eqList){
  const h=['Period','Group','Focus Area','Student','Source Title','Author/Org','URL','MLA Citation','Source Type','Reliability (stars)','Reliability Note','Hypothesis','Method','Key Data/Results','Study Conclusion','Main Argument','Supporting Evidence','Actionable Advice'];
  eqList.forEach((lbl,i)=>{h.push(eqTag(i)+' Checked ('+lbl.substring(0,30)+')');h.push(eqTag(i)+' Comment');});
  S2_GENERAL.forEach((_,i)=>{h.push('S2.General '+(i+1)+' Checked');h.push('S2.General '+(i+1));});
  for(let i=0;i<3;i++){h.push('S2.Focus '+(i+1)+' Checked');h.push('S2.Focus '+(i+1));}
  for(let qi=0;qi<5;qi++){h.push('Quote '+(qi+1));h.push('Quote '+(qi+1)+' Ref');}
  h.push('Other Notes','Potential Section','Tags','Saved At','Teacher Checklist Items','Teacher Comment');
  return h;
}

function cardToRow(card,groupId,feedback,eqList,focusArea){
  const period=groupId.split('_')[0];const group=groupId.split('_')[1];
  const fb=feedback[card.id]||{checklist:{},comment:''};
  const fbChecks=CHECKLIST.filter(item=>fb.checklist&&fb.checklist[item.key]).map(item=>item.label).join('; ');
  const row=[period,group,faLabel(focusArea),card.createdBy||'',card.sourceTitle||'',card.author||'',card.url||'',card.mlaCitation||'',card.sourceType||'',card.reliability||'',card.reliabilityNote||'',card.hypothesis||'',card.method||'',card.keyData||'',card.studyConclusion||'',card.mainArg||'',card.evidence||'',card.advice||''];
  eqList.forEach((_,i)=>{row.push(card.eqs&&card.eqs[i]?'Yes':'No');row.push(card.eqComments&&card.eqComments[i]||'');});
  for(let i=0;i<5;i++){row.push(card.s2genChecked&&card.s2genChecked[i]?'Yes':'No');row.push(card.s2gen&&card.s2gen[i]||'');}
  for(let i=0;i<3;i++){row.push(card.s2focusChecked&&card.s2focusChecked[i]?'Yes':'No');row.push(card.s2focus&&card.s2focus[i]||'');}
  for(let qi=0;qi<5;qi++){const q=card.quotes&&card.quotes[qi];row.push(q?q.text||'':'');row.push(q?q.ref||'':'');}
  row.push(card.otherNotes||'',card.section||'',(card.tags||[]).join('; '),card.savedAt?new Date(card.savedAt).toLocaleString():'',fbChecks,fb.comment||'');
  return row;
}

function downloadCSV(rows,filename){
  const csv=rows.map(r=>r.map(csvQ).join(',')).join('\r\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

async function runStudentExport(){

  const eqList=S.eqList;

}

async function runTeacherExport(){
  const btn=document.getElementById('dl-btn');
  const prog=document.getElementById('modal-progress');
  if(btn)btn.disabled=true;

  let groupsToExport=[];
  if(TX.scope==='group'&&S.teacherGroupId){
    groupsToExport=[S.teacherGroupId];
  } else if(TX.scope==='period'){
    groupsToExport=GROUPS.filter(g=>g.startsWith(TX.period+'_'));
  } else {
    groupsToExport=[...GROUPS];
  }

  const eqList=S.eqList;
  const headers=buildCSVHeaders(eqList);
  const allRows=[headers];
  let loaded=0;

  for(const gid of groupsToExport){
    if(prog)prog.textContent='Loading '+gid+' ('+loaded+'/'+groupsToExport.length+')...';
    let cards,feedback;
    if(gid===S.teacherGroupId){cards=S.teacherCards;feedback=S.teacherFeedback;}
    else{cards=await loadCards(gid);feedback=await loadFB(gid);}
    const gFocus=gid===S.teacherGroupId?S.teacherGroupFocus:(await loadFocus(gid));
    const saved=cards.filter(c=>c.savedAt);
    saved.forEach(c=>{const r=c;while(r.eqs.length<eqList.length)r.eqs.push(false);while(r.eqComments.length<eqList.length)r.eqComments.push('');allRows.push(cardToRow(r,gid,feedback,eqList,gFocus));});
    loaded++;
  }

  const totalCards=allRows.length-1;
  if(prog)prog.textContent='Building file with '+totalCards+' card'+(totalCards!==1?'s':'')+'...';

  let fname='DeepDive_';
  if(TX.scope==='group')fname+=S.teacherGroupId;
  else if(TX.scope==='period')fname+='Period'+TX.period;
  else fname+='AllPeriods';
  fname+='_'+new Date().toISOString().slice(0,10)+'.csv';

  downloadCSV(allRows,fname);
  if(prog)prog.textContent='Done! Exported '+totalCards+' card'+(totalCards!==1?'s':'')+'.';
  if(btn)btn.disabled=false;
  setTimeout(closeModal,2200);
}

async function doSave(id){

  syncCard(id);card.savedAt=Date.now();card.collapsed=true;
  renderCards();renderStudentFB();           // collapse visually immediately
  showSaveStatus('Saving…',true);
  try{
    const updatedJson=await api_('upsertCard','dd-cards-'+S.groupId,JSON.stringify(card));
    // Sync server's authoritative card list back into S.cards
    if(updatedJson){
      const serverCards=JSON.parse(updatedJson);
      serverCards.forEach(padCard);
      // Merge: keep any unsaved (in-progress) cards from local session
      const unsaved=S.cards.filter(c=>!c.savedAt);
      S.cards=[...serverCards,...unsaved];
    }
    backupToLocal();
    showSaveStatus('✓ Saved',true);
    const freshFB=await loadFB(S.groupId);

      S.feedback=freshFB;renderCards();renderStudentFB();

function parseCSV(text){
  // Handles quoted fields, embedded commas, embedded newlines
  const rows=[];let i=0;const n=text.length;
  while(i<n){
    const row=[];
    while(i<n&&!(text[i]==='\r'||text[i]==='\n')||row.length===0&&i<n){
      if(i>=n||text[i]==='\r'||text[i]==='\n')break;
      if(text[i]==='"'){
        i++;let cell='';
        while(i<n){
          if(text[i]==='"'&&i+1<n&&text[i+1]==='"'){cell+='"';i+=2;}
          else if(text[i]==='"'){i++;break;}
          else{cell+=text[i++];}
        }
        row.push(cell);
        if(i<n&&text[i]===',')i++;
      } else {
        let cell='';
        while(i<n&&text[i]!==','&&text[i]!=='\r'&&text[i]!=='\n')cell+=text[i++];
        row.push(cell);
        if(i<n&&text[i]===',')i++;
      }
    }
    if(text[i]==='\r')i++;
    if(text[i]==='\n')i++;
    if(row.length>1||(row.length===1&&row[0]!==''))rows.push(row);
  }
  return rows;
}

function showImportPreview(csvText,filename){
  let rows;
  try{rows=parseCSV(csvText);}catch(err){alert('Could not read CSV: '+err.message);return;}
  if(rows.length<2){alert('The file appears to be empty or has no data rows.');return;}

  const headers=rows[0];
  const dataRows=rows.slice(1).filter(r=>r.some(c=>c.trim()));

  const pIdx=headers.indexOf('Period');
  const gIdx=headers.indexOf('Group');
  const [myPeriod,myGroup]=S.groupId.split('_');

  // Accept rows whose Period+Group match, OR rows with no Period/Group cols at all
  const noPeriodCol=pIdx<0&&gIdx<0;
  const matching=dataRows.filter(r=>{
    if(noPeriodCol)return true;
    const rp=pIdx>=0?(r[pIdx]||''):'';
    const rg=gIdx>=0?(r[gIdx]||''):'';
    return(rp===myPeriod&&rg===myGroup)||(rp===''&&rg==='');
  });
  const skipped=dataRows.length-matching.length;
  const existingSaved=S.cards.filter(c=>c.savedAt).length;

  // Store for runImport
  window._imp={headers,matching};

  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="modal-overlay">
    <div class="modal-box" style="max-width:430px">

        <div>&#x1F4CA; <strong>${dataRows.length}</strong> data row${dataRows.length!==1?'s':''} found in file</div>
        <div style="color:${matching.length>0?'#1a6b5a':'#c0392b'}">&#x${matching.length>0?'2705':'274C'}; <strong>${matching.length}</strong> card${matching.length!==1?'s':''} match your group <strong>${esc(S.groupId)}</strong></div>
        ${skipped>0?`<div style="color:#a06b00">&#x26A0;&#xFE0F; ${skipped} row${skipped!==1?'s':''} from other groups will be skipped</div>`:''}
        <div style="color:#8a7d68;font-size:11.5px;margin-top:4px">Your group currently has <strong>${existingSaved}</strong> saved card${existingSaved!==1?'s':''}</div>
      </div>
      ${matching.length===0
        ?`<div style="color:#c0392b;font-size:12.5px;margin-bottom:16px">No cards matching group <strong>${esc(S.groupId)}</strong> were found. Make sure you are uploading the correct CSV export for this group.</div>`
        :`<div class="modal-section-label">How to handle existing cards</div>
        <div class="scope-options" style="margin-bottom:16px">
          <label class="scope-opt selected" id="imp-merge">
            <input type="radio" name="imp-mode" value="merge" checked onchange="document.getElementById('imp-merge').classList.add('selected');document.getElementById('imp-replace').classList.remove('selected')">
            <div class="scope-opt-label">
              <div><strong>Add alongside existing</strong></div>

            </div>
          </label>
          <label class="scope-opt" id="imp-replace">
            <input type="radio" name="imp-mode" value="replace" onchange="document.getElementById('imp-replace').classList.add('selected');document.getElementById('imp-merge').classList.remove('selected')">

      <div class="modal-btn-row">

async function runImport(){
  const prog=document.getElementById('modal-progress');
  if(prog)prog.textContent='Importing...';
  const btn=document.querySelector('#modal-root .modal-dl-btn');
  if(btn)btn.disabled=true;

  const mode=(document.querySelector('input[name="imp-mode"]:checked')||{}).value||'merge';
  const {headers,matching}=window._imp;

  // Index all columns by header name
  const ci={};headers.forEach((h,i)=>{ci[h]=i;});

  // Parse dynamic EQ columns
  const eqCheckedCols=[],eqCommentCols=[];
  headers.forEach((h,i)=>{
    const mc=h.match(/^EQ(\d+) Checked/);if(mc)eqCheckedCols.push({i,n:parseInt(mc[1])-1});
    const mm=h.match(/^EQ(\d+) Comment/);if(mm)eqCommentCols.push({i,n:parseInt(mm[1])-1});
  });
  // Ensure our EQ list is long enough
  const maxEQ=Math.max(S.eqList.length,...eqCheckedCols.map(x=>x.n+1),1);

  function g(row,col){return(col!==undefined&&col>=0&&col<row.length)?row[col]:'';}

  const newCards=matching.map(row=>{
    const eqs=Array(maxEQ).fill(false);
    const eqComments=Array(maxEQ).fill('');
    eqCheckedCols.forEach(({i,n})=>{if(n<maxEQ)eqs[n]=(g(row,i)||'').trim().toLowerCase()==='yes';});
    eqCommentCols.forEach(({i,n})=>{if(n<maxEQ)eqComments[n]=g(row,i);});

    // Quotes: up to 5
    const quotes=[];
    for(let qi=0;qi<5;qi++){
      const t=g(row,ci['Quote '+(qi+1)]);
      const r=g(row,ci['Quote '+(qi+1)+' Ref']);
      if(t||r)quotes.push({text:t,ref:r});
    }
    if(!quotes.length)quotes.push({text:'',ref:''});

    const tagsRaw=g(row,ci['Tags']);
    const tags=tagsRaw?tagsRaw.split(';').map(t=>t.trim()).filter(Boolean):[];

    const savedAtRaw=g(row,ci['Saved At']);
    const savedAt=savedAtRaw?(Date.parse(savedAtRaw)||Date.now()):Date.now();

    const s2gen=[];const s2genChecked=[];
    for(let i=0;i<5;i++){s2gen.push(g(row,ci['S2.General '+(i+1)])||'');s2genChecked.push((g(row,ci['S2.General '+(i+1)+' Checked'])||'').toLowerCase()==='yes');}
    const s2focus=[];const s2focusChecked=[];
    for(let i=0;i<3;i++){s2focus.push(g(row,ci['S2.Focus '+(i+1)])||'');s2focusChecked.push((g(row,ci['S2.Focus '+(i+1)+' Checked'])||'').toLowerCase()==='yes');}
    return{
      id:uid(),
      createdBy:g(row,ci['Student'])||S.studentName,
      savedAt,collapsed:true,
      sourceType:g(row,ci['Source Type'])||'',
      sourceTitle:g(row,ci['Source Title'])||'',
      author:g(row,ci['Author/Org'])||'',
      url:g(row,ci['URL'])||'',
      mlaCitation:g(row,ci['MLA Citation'])||'',
      reliabilityNote:g(row,ci['Reliability Note'])||'',
      reliability:parseInt(g(row,ci['Reliability (stars)']))||0,
      hypothesis:g(row,ci['Hypothesis'])||'',
      method:g(row,ci['Method'])||'',
      keyData:g(row,ci['Key Data/Results'])||'',
      studyConclusion:g(row,ci['Study Conclusion'])||'',
      mainArg:g(row,ci['Main Argument'])||'',
      evidence:g(row,ci['Supporting Evidence'])||'',
      advice:g(row,ci['Actionable Advice'])||'',
      eqs,eqComments,s2gen,s2genChecked,s2focus,s2focusChecked,quotes,
      otherNotes:g(row,ci['Other Notes'])||'',
      section:g(row,ci['Potential Section'])||'',
      tags
    };
  });

  if(mode==='replace'){
    S.cards=newCards;
  } else {
    // Merge: avoid duplicates by checking savedAt+title combo
    const existingKeys=new Set(S.cards.filter(c=>c.savedAt).map(c=>(c.savedAt||'')+'|'+(c.sourceTitle||'')));
    const deduped=newCards.filter(c=>!existingKeys.has((c.savedAt||'')+'|'+(c.sourceTitle||'')));
    S.cards=[...S.cards,...deduped];
    const skippedDupes=newCards.length-deduped.length;
    if(prog&&skippedDupes>0)prog.textContent='Skipped '+skippedDupes+' duplicate'+(skippedDupes!==1?'s':'')+'. ';
  }

  await saveCards(S.groupId,S.cards);
  S.feedback=await loadFB(S.groupId);

  const n=newCards.length;
  if(prog)prog.textContent=(prog.textContent||'')+'Done! Imported '+n+' card'+(n!==1?'s':'')+'.';
  setTimeout(()=>{closeModal();renderCards();renderStudentFB();},1600);
}

// ── LOCAL BACKUP / RESTORE ───────────────────────────────────
// Writes the current saved cards to localStorage so that if Drive
// loses data (e.g. the server trashed the old file but failed to
// write the new one), the student can recover on their next login
// without losing anything.

function backupToLocal(){
  if(!S.groupId)return;
  const saved=S.cards.filter(c=>c.savedAt);
  if(!saved.length)return;
  try{
    localStorage.setItem('dd-backup-'+S.groupId,JSON.stringify({
      cards:S.cards,
      backedUpAt:Date.now(),
      studentName:S.studentName
    }));
  }catch(e){/* localStorage unavailable — silent fail */}
}

function clearLocalBackup(gid){
  try{localStorage.removeItem('dd-backup-'+gid);}catch(e){}
}

function getLocalBackup(gid){
  try{const r=localStorage.getItem('dd-backup-'+gid);return r?JSON.parse(r):null;}
  catch(e){return null;}
}

async function checkAndRestoreBackup(gid){
  const backup=getLocalBackup(gid);
  if(!backup||!backup.cards||!backup.cards.length)return;

  const backupSaved=backup.cards.filter(c=>c.savedAt);
  if(!backupSaved.length){clearLocalBackup(gid);return;}

  const driveIds=new Set(S.cards.map(c=>c.id));
  const missingFromDrive=backupSaved.filter(c=>!driveIds.has(c.id));

  if(!missingFromDrive.length){
    // Backup is fully redundant — Drive has everything
    clearLocalBackup(gid);
    return;
  }

  if(S.cards.length===0){
    // Drive came back completely empty — auto-restore silently and save
    S.cards=backup.cards.filter(c=>c.savedAt);
    S.cards.forEach(padCard);
    S.driveRestoreNotice='auto';
    // Push everything back to Drive using bulk storageSet (safe write)
    try{
      await gs_('storageSet','dd-cards-'+gid,JSON.stringify(S.cards));
      clearLocalBackup(gid);
    }catch(e){
      // Drive still not writable — keep backup intact so next login can retry
    }
  } else {
    // Drive has SOME data but backup has extra cards not in Drive
    S.pendingRestore={cards:missingFromDrive,total:backupSaved.length,gid};
  }
}

function renderRestoreBanner(){
  // Auto-restore notice (Drive was empty, we silently recovered)
  if(S.driveRestoreNotice==='auto'){
    const notice=document.getElementById('restore-notice');
    if(notice){
      notice.innerHTML=`<div style="background:#e8f4f0;border:1.5px solid #b5ddd5;border-radius:4px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:16px">&#x1F504;</span>
        <span style="font-size:12.5px;color:#1a6b5a;flex:1">Your notes were recovered from a local backup after a server error. Everything has been restored and re-saved.</span>
        <button onclick="this.closest('div').remove()" style="background:none;border:none;font-size:16px;cursor:pointer;color:#1a6b5a;flex-shrink:0">&#x2715;</button>
      </div>`;
    }
    S.driveRestoreNotice=null;
    return;
  }

  // Partial merge offer (Drive had some data, backup has more)
  const pr=S.pendingRestore;
  if(!pr)return;
  const notice=document.getElementById('restore-notice');
  if(!notice)return;
  notice.innerHTML=`<div style="background:#fff8e8;border:2px solid #d4930a;border-radius:6px;padding:14px 18px;margin-bottom:18px">
    <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#a06b00;margin-bottom:8px">&#x1F4BE; Local Backup Found</div>
    <div style="font-size:12.5px;color:#1c1810;line-height:1.6;margin-bottom:12px">
      We found <strong>${pr.cards.length} card${pr.cards.length!==1?'s':''}</strong> in a local backup that ${pr.cards.length!==1?'are':'is'} not currently in the server.
      This can happen when a save is interrupted. Would you like to restore ${pr.cards.length!==1?'them':'it'}?
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button onclick="acceptRestore()" style="background:#0d2b45;color:#fff;border:none;padding:8px 18px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;cursor:pointer">&#x2705; Restore ${pr.cards.length} Card${pr.cards.length!==1?'s':''}</button>
      <button onclick="dismissRestore()" style="background:none;border:1px solid #ddd5c4;color:#8a7d68;padding:8px 14px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer">Dismiss</button>
    </div>
  </div>`;
}

async function acceptRestore(){
  const pr=S.pendingRestore;if(!pr)return;
  // Merge missing cards into S.cards, avoiding duplicates
  const existingIds=new Set(S.cards.map(c=>c.id));
  const toAdd=pr.cards.filter(c=>!existingIds.has(c.id));
  toAdd.forEach(padCard);
  S.cards=[...S.cards,...toAdd];
  S.pendingRestore=null;
  renderCards();renderStudentFB();
  // Save each restored card back to Drive
  showSaveStatus('Restoring…',true);
  try{
    for(const card of toAdd){
      await api_('upsertCard','dd-cards-'+S.groupId,JSON.stringify(card));
    }
    clearLocalBackup(S.groupId);
    showSaveStatus('✓ '+toAdd.length+' card'+(toAdd.length!==1?'s':'')+' restored',true);
  }catch(e){
    showSaveStatus('✗ Restore failed — '+((e&&e.message)||'please try again'),false);
  }
  const notice=document.getElementById('restore-notice');
  if(notice)notice.innerHTML='';
}

function dismissRestore(){
  S.pendingRestore=null;
  clearLocalBackup(S.groupId);
  const notice=document.getElementById('restore-notice');
  if(notice)notice.innerHTML='';
}


// ── AUTOCOMPLETE SUGGEST ENGINE ─────────────────────────────
// Collects all existing values from saved cards in the group.
function allGroupSections(){
  return [...new Set(S.cards.filter(c=>c.savedAt&&c.section).map(c=>c.section))].sort();
}
function allGroupTags(){
  return [...new Set(S.cards.filter(c=>c.savedAt).flatMap(c=>c.tags||[]))].sort();
}

function showSuggest(kind,id,val){
  const dropId=kind==='section'?'sec-suggest-'+id:'tag-suggest-'+id;
  const drop=document.getElementById(dropId);if(!drop)return;
  const raw=val.trim().replace(/^#/,'').toLowerCase();
  const pool=kind==='section'?allGroupSections():allGroupTags();

  // For tags, exclude ones already on this card
  let filtered=pool;
  if(kind==='tag'){
    const card=S.cards.find(c=>c.id===id);
    const current=card?card.tags:[];
    filtered=pool.filter(t=>!current.includes(t));
  }

  const matches=raw?filtered.filter(v=>v.toLowerCase().includes(raw)):filtered;

  if(!matches.length&&!raw){drop.classList.add('hidden');drop.innerHTML='';return;}

  let html='';
  matches.forEach((m,i)=>{
    const display=kind==='tag'?'#'+m:m;
    html+=`<div class="suggest-item" data-val="${esc(m)}" onmousedown="pickSuggest(event,'${kind}','${id}','${esc(m).replace(/'/g,"\'")}')">
      ${esc(display)}
    </div>`;
  });
  // "Add new" option when typed value doesn't exactly match anything
  const exactMatch=pool.some(v=>v.toLowerCase()===(raw));
  if(raw&&!exactMatch){
    const newLabel=kind==='tag'?'#'+val.trim().replace(/^#/,''):val.trim();
    html+=`<div class="suggest-item" data-val="${esc(val.trim().replace(/^#/,''))}" onmousedown="pickSuggest(event,'${kind}','${id}','${esc(val.trim().replace(/^#/,'')).replace(/'/g,"\'")}')">
      <span class="suggest-new">+ Add &ldquo;${esc(newLabel)}&rdquo;</span>
    </div>`;
  }

  if(!html){drop.classList.add('hidden');drop.innerHTML='';return;}
  drop.innerHTML=html;drop.classList.remove('hidden');
}

function hideSuggest(kind,id){
  const dropId=kind==='section'?'sec-suggest-'+id:'tag-suggest-'+id;
  const drop=document.getElementById(dropId);
  if(drop){drop.classList.add('hidden');drop.innerHTML='';}
}

function pickSuggest(e,kind,id,val){
  e.preventDefault();
  if(kind==='section'){
    const inp=document.getElementById(id+'-section');
    if(inp){inp.value=val;inp.dispatchEvent(new Event('input'));}
    hideSuggest('section',id);
  } else {
    commitTag(id,val);
    const inp=document.getElementById('taginput-'+id);
    if(inp){inp.value='';inp.focus();}
    hideSuggest('tag',id);
  }
}

function suggestKey(e,kind,id){
  const dropId=kind==='section'?'sec-suggest-'+id:'tag-suggest-'+id;
  const drop=document.getElementById(dropId);if(!drop||drop.classList.contains('hidden'))return;
  const items=[...drop.querySelectorAll('.suggest-item')];if(!items.length)return;
  const cur=drop.querySelector('.suggest-item.active');
  let idx=cur?items.indexOf(cur):-1;
  if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(idx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(idx-1,0);}
  else if(e.key==='Enter'&&cur){e.preventDefault();cur.dispatchEvent(new MouseEvent('mousedown'));return;}
  else if(e.key==='Escape'){hideSuggest(kind,id);return;}
  else return;
  items.forEach(el=>el.classList.remove('active'));
  if(idx>=0)items[idx].classList.add('active');
}
